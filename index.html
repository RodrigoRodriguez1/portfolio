    <!-- Theme: anti-flash script -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var preferred = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.remove('dark', 'light');
        document.documentElement.classList.add(preferred);
      })();
    </script>
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: Geist via Google Fonts fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"

    />
